<style>
#erd svg { width: 100%; height: auto; }
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd" style="padding: 1rem 0;"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#CECBF6' : '#26215C',
    primaryBorderColor: dark ? '#534AB7' : '#534AB7',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    secondaryTextColor: dark ? '#9FE1CB' : '#04342C',
    tertiaryColor: dark ? '#633806' : '#FAEEDA',
    tertiaryTextColor: dark ? '#FAC775' : '#412402',
  },
});
const diagram = `erDiagram
  clubs {
    uuid id PK
    string nombre
    string telefono
    string ciudad
    string whatsapp_number
    text system_prompt
    boolean activo
    timestamp created_at
  }
  conversaciones {
    uuid id PK
    uuid club_id FK
    string numero_usuario
    string nombre_usuario
    jsonb historial
    string estado
    timestamp updated_at
  }
  deportistas {
    uuid id PK
    uuid club_id FK
    string nombre
    string documento
    string telefono
    string categoria
    date fecha_nacimiento
    string estado
    timestamp created_at
  }
  mensualidades {
    uuid id PK
    uuid deportista_id FK
    uuid club_id FK
    string mes_anio
    decimal monto
    string estado
    string wompi_ref
    timestamp pagado_at
  }
  productos {
    uuid id PK
    uuid club_id FK
    string nombre
    text descripcion
    decimal precio
    integer stock
    string categoria
    boolean activo
  }
  pedidos {
    uuid id PK
    uuid club_id FK
    uuid deportista_id FK
    decimal total
    string estado
    timestamp created_at
  }
  pedido_items {
    uuid id PK
    uuid pedido_id FK
    uuid producto_id FK
    integer cantidad
    decimal precio_unitario
  }
  pagos {
    uuid id PK
    uuid club_id FK
    string referencia_wompi
    decimal monto
    string tipo
    string estado
    jsonb wompi_data
    timestamp created_at
  }

  clubs ||--o{ conversaciones : "tiene"
  clubs ||--o{ deportistas : "inscribe"
  clubs ||--o{ productos : "vende"
  clubs ||--o{ mensualidades : "cobra"
  clubs ||--o{ pedidos : "gestiona"
  clubs ||--o{ pagos : "registra"
  deportistas ||--o{ mensualidades : "paga"
  deportistas ||--o{ pedidos : "realiza"
  pedidos ||--o{ pedido_items : "contiene"
  productos ||--o{ pedido_items : "incluido en"
  pagos ||--o| mensualidades : "confirma"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
